<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblo-Run: Moscow City</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://sdk.games.s3.yandex.net/sdk.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; color: white; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        
        .hud-top { padding: 20px; display: flex; justify-content: space-between; text-shadow: 2px 2px 0 #000; font-weight: 900; font-size: 24px; pointer-events: auto; }
        .score-box { display: flex; align-items: center; gap: 10px; color: #FFD700; transition: transform 0.1s; }
        .score-box.pop { transform: scale(1.3); color: #fff; }
        .shield-box { color: #00E5FF; display: none; text-shadow: 0 0 10px #00E5FF; }
        .ping-box { color: #00E676; text-shadow: 0 0 10px #00E676; }
        
        /* MENU STYLES FIXED */
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            display: flex; flex-direction: column; align-items: center; 
            z-index: 10; transition: opacity 0.3s;
        }
        .hidden { opacity: 0; pointer-events: none; display: none !important; }
        
        .menu-header { margin-top: 20px; text-align: center; flex-shrink: 0; }
        h1 { font-size: 42px; text-transform: uppercase; text-shadow: 4px 4px 0 #D32F2F; margin: 0; transform: skew(-5deg); letter-spacing: 2px; }
        
        .tabs { display: flex; gap: 10px; margin: 15px 0; z-index: 20; flex-shrink: 0; }
        .tab-btn { background: #212121; border: 2px solid #424242; color: #aaa; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: #D32F2F; border-color: #FF5252; color: white; box-shadow: 0 0 15px #D32F2F; }
        
        .content-area {
            flex-grow: 1;
            width: 100%;
            max-width: 500px;
            overflow-y: auto;
            padding: 0 10px 100px 10px; /* Bottom padding for play button */
            box-sizing: border-box;
        }
        
        .panel { display: none; animation: fadeIn 0.3s; width: 100%; }
        .panel.active { display: block; }
        
        /* UI COMPONENTS */
        .stats-card { background: linear-gradient(135deg, #212121, #323232); border: 1px solid #555; border-radius: 5px; padding: 20px; margin-bottom: 15px; }
        .currency-row { display: flex; justify-content: space-around; margin-bottom: 15px; background: #111; padding: 10px; border-radius: 8px; }
        .curr-item { font-size: 18px; font-weight: bold; text-align: center; }
        .curr-sub { font-size: 11px; color: #888; display: block; }
        
        .farm-item, .inventory-item { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 5px; margin-bottom: 8px; }
        .upgrade-btn-small, .sell-btn { background: linear-gradient(45deg, #FF6D00, #FFAB00); border: none; padding: 8px 12px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; min-width: 70px; font-size: 12px; }
        .sell-btn { background: linear-gradient(45deg, #00E676, #00C853); }
        .upgrade-btn-small:disabled { background: #444; color: #777; }
        
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .shop-item { background: #1a1a1a; border: 2px solid #333; border-radius: 5px; padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .shop-item.owned { border-color: #00E676; opacity: 0.8; }
        .shop-item.equipped { border-color: #FFD700; box-shadow: 0 0 10px #FFD700; opacity: 1; }
        .item-icon { font-size: 28px; display: block; margin-bottom: 5px; }
        .buy-btn { background: #D32F2F; color: white; border: none; padding: 8px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; margin-top: auto; font-size: 12px; }
        .buy-btn.equip { background: #FFD700; color: black; }
        .buy-btn:disabled { background: #333; color: #555; cursor: not-allowed; }
        
        /* FIXED PLAY BUTTON */
        .btn-play-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, #000 0%, transparent 100%);
            display: flex;
            justify-content: center;
            pointer-events: none; /* Allow click through gradient */
        }
        .btn-play { 
            pointer-events: auto;
            background: linear-gradient(45deg, #D32F2F, #B71C1C); 
            padding: 15px 60px; 
            font-size: 24px; 
            color: white; 
            border: 2px solid #FF5252; 
            border-radius: 5px; 
            font-weight: 900; 
            box-shadow: 0 5px 15px rgba(0,0,0, 0.8); 
            cursor: pointer; 
            white-space: nowrap;
            animation: pulseBtn 2s infinite;
        }
        
        .btn-ad { background: linear-gradient(45deg, #1565C0, #0D47A1); margin-bottom: 15px; position: relative; display: block; width: 100%; border: 2px solid #42A5F5; transform: none; left: auto; bottom: auto; margin-top: 10px; }

        .reset-save-btn { position: absolute; top: 10px; right: 10px; background: transparent; border: 1px solid #333; color: #333; font-size: 10px; cursor: pointer; padding: 5px; }
        
        /* ROULETTE & POPUPS */
        #case-hud { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 300px; height: 80px; background: rgba(0,0,0,0.9); border: 3px solid #FFD700; border-radius: 10px; overflow: hidden; display: none; pointer-events: none; }
        #case-hud.active { display: block; }
        .reel-marker { position: absolute; left: 50%; top: -5px; bottom: -5px; width: 4px; background: #FF1744; z-index: 50; transform: translateX(-50%); }
        .reel-strip-h { display: flex; height: 100%; align-items: center; will-change: transform; }
        .reel-item-h { min-width: 100px; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid #333; background: #222; }
        .reel-text-h { font-weight: 900; font-size: 14px; text-transform: uppercase; text-align: center; padding: 0 5px; }

        .loot-toast { position: absolute; top: 20%; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(0,0,0,0.9); border: 2px solid #FFD700; padding: 15px 30px; border-radius: 30px; text-align: center; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 60; }
        .loot-toast.active { opacity: 1; transform: translateX(-50%) translateY(0); }
        .loot-name { font-size: 24px; font-weight: bold; color: #FFD700; }
        
        .offline-modal, .summary-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20,20,20,0.95); border: 3px solid #FFD700; padding: 20px; border-radius: 15px; z-index: 110; width: 80%; max-width: 400px; text-align: center; display: none; }
        .summary-list { margin: 15px 0; text-align: left; max-height: 200px; overflow-y: auto; }
        .summary-item { margin-bottom: 5px; font-size: 14px; border-bottom: 1px solid #333; padding: 5px; }

        @keyframes pulseBtn { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .float-text { position: absolute; font-weight: bold; font-size: 32px; color: #fff; text-shadow: 3px 3px 0 #000; pointer-events: none; animation: floatUp 1s forwards; z-index: 20; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-150px) scale(1.2); } }
    </style>
</head>
<body>

<div id="game-container"></div>

<div id="ui-layer">
    <div class="hud-top" id="hud" class="hidden">
        <div class="score-box" id="score-box">⚡ <span id="hud-chips">0</span></div>
        <div class="shield-box" id="hud-shield">🛡️ ЩИТ</div>
        <div class="ping-box"><span id="ping-text">20</span> ms</div>
    </div>
    <div id="case-hud"><div class="reel-marker"></div><div id="reel-strip-h" class="reel-strip-h"></div></div>
    <div id="loot-toast" class="loot-toast"><div style="font-size:12px; color:#aaa;">ВЫПАЛ ПРЕДМЕТ</div><div class="loot-name" id="toast-name">ITEM</div></div>
</div>

<div id="start-screen" class="screen">
    <button class="reset-save-btn" onclick="hardReset()">Сброс</button>
    <div class="menu-header"><h1>MOSCOW RUN</h1><div style="font-size: 14px; color: #aaa;">ESCAPE THE BAN</div></div>
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('farm')">ФЕРМА</div>
        <div class="tab-btn" onclick="switchTab('shop')">ЛАРЁК</div>
        <div class="tab-btn" onclick="switchTab('inventory')">РЮКЗАК</div>
    </div>
    
    <div class="content-area">
        <div id="tab-farm" class="panel active">
            <div class="stats-card">
                <div class="currency-row">
                    <div class="curr-item" style="color: #FFD700;"><span id="menu-chips">0</span> ⚡<br><span class="curr-sub">ЧИПЫ</span></div>
                    <div class="curr-item" style="color: #00E676;"><span id="menu-robux">0.0</span> 💎<br><span class="curr-sub">ROBX</span></div>
                </div>
                <div style="text-align: center; margin-bottom: 15px;">Доход: <span style="color: #00E676;">+<span id="farm-total-rate">0.0</span> 💎/сек</span></div>
                <div class="farm-list" id="farm-list"></div>
            </div>
        </div>
        
        <div id="tab-shop" class="panel">
            <div class="currency-row"><div class="curr-item" style="color: #00E676;">Баланс: <span id="shop-robux">0.0</span> 💎</div></div>
            <h3 style="margin: 10px 0; color: #aaa;">ОБОРУДОВАНИЕ</h3><div class="shop-grid" id="shop-upgrades"></div>
            <h3 style="margin: 20px 0 10px 0; color: #aaa;">ПРИКИД</h3><div class="shop-grid" id="shop-skins"></div>
        </div>

        <div id="tab-inventory" class="panel">
            <div style="text-align: center; margin-bottom: 15px; color: #aaa;">Сдавай лут барыге!</div>
            <button onclick="Player.sellAllLoot()" class="buy-btn" style="background: #D32F2F; margin-bottom: 15px;">ПРОДАТЬ ВСЁ</button>
            <div id="inventory-list"></div>
        </div>
    </div>

    <div class="btn-play-container"><button class="btn-play" onclick="startGame()">RUN! (Space)</button></div>
</div>

<div id="offline-modal" class="offline-modal"><div>Пока тебя не было, ферма накрутила:</div><div class="offline-val">+<span id="offline-amount">0</span> 💎</div><button class="buy-btn" onclick="closeOfflineModal()">ЗАБРАТЬ</button></div>
<div id="summary-modal" class="summary-modal"><h2 style="color:#FFD700; margin-top:0;">БОНУС!</h2><div id="summary-content" class="summary-list"></div><button class="buy-btn" onclick="closeSummaryModal()">ОК</button></div>

<div id="game-over-screen" class="screen hidden" style="justify-content: center;">
    <h1 style="color: #FF1744;">ПОТРАЧЕНО</h1>
    <h2 style="color: #FFD700;">+<span id="run-earned">0</span> ⚡</h2>
    <p id="death-reason" style="color: #aaa; margin-bottom: 30px;"></p>
    <div id="ad-bonus-container" style="width: 80%; text-align: center;"></div>
    <div class="btn-play-container" style="position: relative; bottom: auto;"><button class="btn-play" onclick="resetGame()">В МЕНЮ</button></div>
</div>

<script>
// --- UTILS ---
function createTextTexture(text) {
    const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512; 
    const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, 512, 512);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = '900 160px Arial'; 
    ctx.fillStyle = 'white'; ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10;
    ctx.fillText(text, 256, 256); ctx.strokeStyle = 'black'; ctx.lineWidth = 8; ctx.strokeText(text, 256, 256);
    return new THREE.CanvasTexture(canvas);
}
function createCaseTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d'); const grd = ctx.createLinearGradient(0,0,128,128);
    grd.addColorStop(0, '#7C4DFF'); grd.addColorStop(1, '#651FFF'); ctx.fillStyle = grd; ctx.fillRect(0,0,128,128);
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 5; ctx.strokeRect(0,0,128,128);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 80px Arial'; ctx.textAlign = 'center'; ctx.textBaseline='middle'; ctx.fillText('?', 64, 64);
    return new THREE.CanvasTexture(canvas);
}

// --- DATA ---
const FARM_COMPONENTS = [
    { id: 'cpu', name: 'CPU', icon: '💻', baseCost: 10, incomePerLvl: 0.1, color: '#2979FF' },
    { id: 'ram', name: 'RAM', icon: '💾', baseCost: 50, incomePerLvl: 0.3, color: '#00E676' },
    { id: 'gpu', name: 'GPU', icon: '📟', baseCost: 200, incomePerLvl: 1.0, color: '#FFD700' }
];
const SHOP_ITEMS = {
    upgrades: [
        { id: 'keyboard', name: 'RGB Клава', icon: '⌨️', baseCost: 100, desc: '+20% Чипов', isMultiLevel: true, maxLevel: 10 },
        { id: 'chair', name: 'Кресло', icon: '💺', cost: 5000, desc: 'Щит (1 удар)' },
        { id: 'vpn_pro', name: 'VPN Pro', icon: '🌐', cost: 50000, desc: 'Медленный Пинг' }
    ],
    skins: [
        { id: 'classic', name: 'Патриот', icon: '🇷🇺', cost: 0, color: 0xFFD700 }, 
        { id: 'hacker', name: 'Анонимус', icon: '🕵️', cost: 1000, color: 0x333333 },
        { id: 'doge', name: 'Doge', icon: '🐶', cost: 2500, color: 0xD4C189 },
        { id: 'amogus', name: 'Imposter', icon: '📮', cost: 5000, color: 0xFF0000 },
        { id: 'rich', name: 'Мажор', icon: '👑', cost: 20000, color: 0xFFD700 }
    ]
};
const BRAINROT_LOOT = [
    { id: 'hamster', name: 'Хомяк', label: 'ХОМЯК', rarity: 'common', price: 10, color: '#9E9E9E' },
    { id: 'capybara', name: 'Капибара', label: 'КАПИ', rarity: 'common', price: 15, color: '#9E9E9E' },
    { id: 'sad_cat', name: 'Грустный Кот', label: 'КОТ', rarity: 'common', price: 20, color: '#9E9E9E' },
    { id: 'skibidi', name: 'Скибиди', label: 'СКИБИДИ', rarity: 'rare', price: 100, color: '#00E5FF' },
    { id: 'altushka', name: 'Альтушка', label: 'АЛЬТ', rarity: 'rare', price: 150, color: '#00E5FF' },
    { id: 'sigma', name: 'Сигма', label: 'СИГМА', rarity: 'legendary', price: 1000, color: '#FFD700' },
    { id: 'gigachad', name: 'Гигачад', label: 'ЧАД', rarity: 'legendary', price: 2500, color: '#FFD700' }
];

// --- PLAYER ---
const Player = {
    data: { chips: 0, robux: 0, farm: { cpu: 1, ram: 0, gpu: 0 }, upgradeLevels: { keyboard: 0 }, inventory: ['classic'], loot: [], equippedSkin: 'classic', lastSaveTime: Date.now() },
    timer: null,
    init: function() {
        const saved = localStorage.getItem('robloRunV13');
        if (saved) { try { const d=JSON.parse(saved); this.data={...this.data,...d}; if(!this.data.upgradeLevels)this.data.upgradeLevels={keyboard:0}; if(!this.data.loot)this.data.loot=[]; if(this.data.inventory.includes('keyboard')){this.data.inventory=this.data.inventory.filter(i=>i!=='keyboard');if(this.data.upgradeLevels.keyboard===0)this.data.upgradeLevels.keyboard=1;} } catch(e){} }
        const now = Date.now(); const earned = parseFloat(((now-this.data.lastSaveTime)/1000*this.getTotalIncome()).toFixed(1));
        if (earned > 0) { this.data.robux+=earned; document.getElementById('offline-amount').innerText=earned; document.getElementById('offline-modal').style.display='block'; }
        this.startMining(); this.renderFarm(); this.renderShop(); this.renderInventory(); this.updateUI();
    },
    save: function() { this.data.lastSaveTime = Date.now(); localStorage.setItem('robloRunV13', JSON.stringify(this.data)); },
    getTotalIncome: function() { let t=0; FARM_COMPONENTS.forEach(c=>t+=(this.data.farm[c.id]||0)*c.incomePerLvl); return parseFloat(t.toFixed(1)); },
    getComponentCost: function(id) { return Math.floor(FARM_COMPONENTS.find(c=>c.id===id).baseCost * Math.pow(1.5, this.data.farm[id]||0)); },
    getShopItemCost: function(item) { return item.isMultiLevel ? Math.floor(item.baseCost * Math.pow(1.5, this.data.upgradeLevels[item.id]||0)) : item.cost; },
    startMining: function() { if(this.timer)clearInterval(this.timer); this.timer=setInterval(()=>{ const inc=this.getTotalIncome(); if(inc>0){this.data.robux=parseFloat((this.data.robux+inc).toFixed(1));this.save();this.updateUI();} }, 1000); },
    buyShopItem: function(id, cost, type) {
        if (this.data.robux >= cost) {
            this.data.robux -= cost; const item = SHOP_ITEMS.upgrades.find(u=>u.id===id);
            if(item && item.isMultiLevel) { if(!this.data.upgradeLevels[id])this.data.upgradeLevels[id]=0; this.data.upgradeLevels[id]++; }
            else { if(!this.data.inventory.includes(id))this.data.inventory.push(id); if(type==='skin')this.data.equippedSkin=id; }
            this.save(); this.renderShop(); this.updateUI(); AudioSys.playCoin();
        }
    },
    upgradeComponent: function(id) { const cost=this.getComponentCost(id); if(this.data.chips>=cost){this.data.chips-=cost; this.data.farm[id]++; this.save(); this.renderFarm(); this.updateUI(); AudioSys.playCoin();} },
    equipSkin: function(id) { this.data.equippedSkin=id; this.save(); this.renderShop(); },
    hasItem: function(id) { return this.data.inventory.includes(id); },
    addLoot: function(itemId) { this.data.loot.push(itemId); this.save(); this.renderInventory(); },
    sellLoot: function(index) { const id=this.data.loot[index]; const item=BRAINROT_LOOT.find(i=>i.id===id); this.data.robux+=item.price; this.data.loot.splice(index,1); this.save(); this.updateUI(); this.renderInventory(); AudioSys.playCoin(); },
    sellAllLoot: function() { if(this.data.loot.length===0)return; let total=0; this.data.loot.forEach(id=>{const item=BRAINROT_LOOT.find(i=>i.id===id);if(item)total+=item.price;}); this.data.robux+=total; this.data.loot=[]; this.save(); this.updateUI(); this.renderInventory(); AudioSys.playCoin(); },
    updateUI: function() {
        document.getElementById('menu-chips').innerText = Math.floor(this.data.chips); document.getElementById('menu-robux').innerText = this.data.robux.toFixed(1);
        document.getElementById('shop-robux').innerText = this.data.robux.toFixed(1); document.getElementById('farm-total-rate').innerText = this.getTotalIncome();
        FARM_COMPONENTS.forEach(c => { const btn=document.getElementById(`btn-upg-${c.id}`); if(btn) btn.disabled = this.data.chips < this.getComponentCost(c.id); });
        this.renderShop(); 
    },
    renderFarm: function() { document.getElementById('farm-list').innerHTML = FARM_COMPONENTS.map(c => { const cost = this.getComponentCost(c.id); return `<div class="farm-item"><div class="farm-info"><div style="color:${c.color}">${c.icon} ${c.name} <span style="color:#aaa;font-size:12px;">(Lvl ${this.data.farm[c.id]||0})</span></div><div class="farm-bonus">+${c.incomePerLvl} 💎/сек</div></div><button id="btn-upg-${c.id}" class="upgrade-btn-small" onclick="Player.upgradeComponent('${c.id}')">+1<br>${cost} ⚡</button></div>`; }).join(''); },
    renderShop: function() {
        const createCard = (item, type) => {
            const owned = this.hasItem(item.id); const cost = this.getShopItemCost(item); const can = this.data.robux >= cost; let btn = '';
            if(item.isMultiLevel) { const lvl=this.data.upgradeLevels[item.id]||0; if(lvl>=item.maxLevel)btn=`<button class="buy-btn" disabled>MAX</button>`; else btn=`<button class="buy-btn" ${can?'':'disabled'} onclick="Player.buyShopItem('${item.id}',${cost},'upgrade')">Lvl ${lvl+1}<br>${cost} 💎</button>`; }
            else { if(type==='skins'&&owned) btn=this.data.equippedSkin===item.id?`<button class="buy-btn" disabled>НАДЕТО</button>`:`<button class="buy-btn equip" onclick="Player.equipSkin('${item.id}')">НАДЕТЬ</button>`; else if(owned)btn=`<button class="buy-btn" disabled>КУПЛЕНО</button>`; else btn=`<button class="buy-btn" ${can?'':'disabled'} onclick="Player.buyShopItem('${item.id}',${cost},'${type==='skins'?'skin':'upgrade'}')">${cost} 💎</button>`; }
            return `<div class="shop-item ${owned&&!item.isMultiLevel?'owned':''} ${this.data.equippedSkin===item.id?'equipped':''}" style="${item.id==='vpn_pro'?'border:2px solid #00E5FF':''}"><span class="item-icon">${item.icon}</span><div class="item-name">${item.name}</div><div class="item-desc">${item.desc}</div>${btn}</div>`;
        };
        document.getElementById('shop-upgrades').innerHTML = SHOP_ITEMS.upgrades.map(i => createCard(i, 'upgrades')).join('');
        document.getElementById('shop-skins').innerHTML = SHOP_ITEMS.skins.map(i => createCard(i, 'skins')).join('');
    },
    renderInventory: function() {

const AudioSys = {
    ctx: null, init: function() { window.AudioContext = window.AudioContext||window.webkitAudioContext; this.ctx=new AudioContext(); },
    play: function(t) { if(!this.ctx)return; if(this.ctx.state==='suspended')this.ctx.resume(); const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination); const time=this.ctx.currentTime;
        if(t==='jump'){o.frequency.setValueAtTime(300,time);o.frequency.linearRampToValueAtTime(500,time+0.1);g.gain.exponentialRampToValueAtTime(0.01,time+0.1);o.start();o.stop(time+0.1);}
        else if(t==='coin'){o.type='sine';o.frequency.setValueAtTime(1200,time);g.gain.exponentialRampToValueAtTime(0.01,time+0.2);o.start();o.stop(time+0.2);}
        else if(t==='gate'){o.type='square';o.frequency.setValueAtTime(600,time);g.gain.exponentialRampToValueAtTime(0.01,time+0.1);o.start();o.stop(time+0.1);}
        else if(t==='bad'){o.type='sawtooth';o.frequency.setValueAtTime(150,time);g.gain.linearRampToValueAtTime(0,time+0.3);o.start();o.stop(time+0.3);}
        else if(t==='loot'){o.type='triangle';o.frequency.setValueAtTime(400,time);o.frequency.linearRampToValueAtTime(800,time+0.5);g.gain.linearRampToValueAtTime(0,time+0.5);o.start();o.stop(time+0.5);} 
        else if(t==='tick'){o.type='square';o.frequency.setValueAtTime(800,time);g.gain.exponentialRampToValueAtTime(0.01,time+0.05);o.start();o.stop(time+0.05);}
    }, playCoin: function(){this.play('coin');}
};

    spawnObjsOnChunk: function(z) {
        if(z<20) return; this.chunksSinceHazard++;
        if (this.framesSinceCase > 1200) { const lane = Math.floor(Math.random()*3)-1; this.createCase(z, lane); this.framesSinceCase = 0; this.framesSinceGate = 600; return; }
        if (this.framesSinceGate > 1200) {
            const definitions = []; let mysteryCount = 0;
            for(let i=0; i<3; i++) {
                let def = { op: 'add', val: 10, txt: '+10', isMystery: false }; const r = Math.random();
                if(r < 0.3 && mysteryCount === 0) { def.isMystery = true; def.txt = '?'; const subR = Math.random(); if(subR < 0.5) { def.op='mult'; def.val=(Math.random()*2+1).toFixed(1); } else { def.op='sub'; def.val=Math.floor(Math.random()*200+50); } mysteryCount++; } 
                else { const subR = Math.random(); if(subR < 0.25) { def.op='mult'; def.val=(Math.random()*1.5+1.2).toFixed(1); def.txt='x'+def.val; } else if(subR < 0.5) { def.op='add'; def.val=Math.floor(Math.random()*50+10); def.txt='+'+def.val; } else if(subR < 0.75) { def.op='mult'; def.val=(Math.random()*0.5+0.1).toFixed(1); def.txt='x'+def.val; } else { def.op='sub'; def.val=Math.floor(Math.random()*100+20); def.txt='-'+def.val; } }
                definitions.push(def);
            }
            const hasPositive = definitions.some(d => (d.op === 'add' || (d.op === 'mult' && d.val > 1)));
            if (!hasPositive) { const nonMysteryIdx = definitions.findIndex(d => !d.isMystery); if(nonMysteryIdx !== -1) definitions[nonMysteryIdx] = { op: 'mult', val: '2.0', txt: 'x2.0', isMystery: false }; }
            [-1, 0, 1].forEach((lane, idx) => { const def = definitions[idx]; this.createGate(z, lane, def.op, def.val, def.txt); });
            this.framesSinceGate = 0; this.framesSinceCase = 600; this.chunksSinceHazard = 0; return;
        }
        if (Math.random() < 0.25 && this.chunksSinceHazard > 3) { 
            const obstacleTypes = ['barrier', 'inspector', 'highBeam', 'policeCar', 'drone', 'spikes', 'laserGate', 'cones'];
            const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
            const lane = Math.floor(Math.random()*3)-1;
            const group = new THREE.Group();
            
            if(type==='barrier') {
                // Low barrier - jump over
                const b = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.8, 0.5), new THREE.MeshStandardMaterial({color: 0xFFFFFF}));
                const s1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.82, 0.52), new THREE.MeshBasicMaterial({color: 0xFF0000})); s1.position.x=-0.5; b.add(s1);
                const s2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.82, 0.52), new THREE.MeshBasicMaterial({color: 0xFF0000})); s2.position.x=0.5; b.add(s2);
                b.position.y=0.4; b.castShadow=true; group.add(b);
            } else if(type==='inspector') {
                // Standing person - jump over
                const matSuit = new THREE.MeshStandardMaterial({color:0x111111});
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.0, 0.4), matSuit); body.position.y=1.0; body.castShadow=true; group.add(body);
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color:0xffccaa})); head.position.y=1.7; group.add(head);
                const legs = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.4), matSuit); legs.position.y=0.4; group.add(legs);
            } else if(type==='highBeam') {
                // High beam - slide under (only beam is collidable, at y=0.7)
                const beam = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.15, 0.15), new THREE.MeshStandardMaterial({color: 0xFFD700, emissive: 0xFF4400}));
                beam.position.y = 0.7; beam.castShadow=true; group.add(beam);
                // Poles are separate objects (visual only, not in collision group)
                const poleL = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.7), new THREE.MeshStandardMaterial({color: 0x444444}));
                poleL.position.set(-1.1, 0.35, 0); this.scene.add(poleL); this.decors.push(poleL); poleL.position.z = z;
                const poleR = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.7), new THREE.MeshStandardMaterial({color: 0x444444}));
                poleR.position.set(1.1, 0.35, 0); this.scene.add(poleR); this.decors.push(poleR); poleR.position.z = z;
                poleL.position.x = -lane*2.2 - 1.1; poleR.position.x = -lane*2.2 + 1.1;
                group.userData.needSlide = true;
            } else if(type==='policeCar') {
                // Police car - jump or avoid
                const carBody = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 1.2), new THREE.MeshStandardMaterial({color: 0x1a237e}));
                carBody.position.y = 0.5; carBody.castShadow=true; group.add(carBody);

                carTop.position.y = 1; group.add(carTop);
                const siren = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.2), new THREE.MeshBasicMaterial({color: 0xff0000}));
                siren.position.set(0, 1.3, 0); group.add(siren);

                siren2.position.set(0.5, 1.3, 0); group.add(siren2);

            } else if(type==='drone') {
                // Flying drone - slide under
                const droneBody = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 0.8), new THREE.MeshStandardMaterial({color: 0x333333, metalness: 0.8}));
                droneBody.position.y = 1.5; group.add(droneBody);
                const propellers = [];
                for(let i = 0; i < 4; i++) {
                    const prop = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.05, 0.1), new THREE.MeshBasicMaterial({color: 0x666666}));
                    prop.position.set((i%2===0?-0.5:0.5), 1.6, (i<2?-0.4:0.4));
                    propellers.push(prop); group.add(prop);
                }
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xff0000}));
                eye.position.set(0, 1.4, 0.3); group.add(eye);
                group.userData.propellers = propellers;
                group.userData.needSlide = true;
                group.userData.hover = true;
            } else if(type==='spikes') {
                // Spikes on ground - jump over
                for(let i = 0; i < 5; i++) {
                    const spike = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.6, 4), new THREE.MeshStandardMaterial({color: 0x888888, metalness: 0.9}));
                    spike.position.set(-0.6 + i*0.3, 0.3, 0); spike.castShadow=true; group.add(spike);
                }
            } else if(type==='laserGate') {
                // Laser gate - slide under

                const laser = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.1, 0.05), new THREE.MeshBasicMaterial({color: 0xff0000, transparent: true, opacity: 0.8}));
                laser.position.y = 1.0; group.add(laser);
                const laser2 = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.1, 0.05), new THREE.MeshBasicMaterial({color: 0xff0000, transparent: true, opacity: 0.8}));
                laser2.position.y = 1.5; group.add(laser2);
                group.userData.lasers = [laser, laser2];
                group.userData.needSlide = true;
            } else if(type==='cones') {
                // Traffic cones - jump over
                for(let i = 0; i < 3; i++) {
                    const cone = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.5, 8), new THREE.MeshStandardMaterial({color: 0xff6600}));
                    cone.position.set(-0.4 + i*0.4, 0.25, (i===1?0.2:0)); cone.castShadow=true; group.add(cone);
                }
            }
            
            group.position.set(-lane*2.2, 0, z); group.userData.type = 'hazard'; 
            this.scene.add(group); this.obstacles.push(group); this.chunksSinceHazard = 0;
            
            // Sometimes spawn in multiple lanes for harder challenge
            if(Math.random() < 0.3 && type !== 'policeCar') {
                const lane2 = lane === 0 ? (Math.random() > 0.5 ? 1 : -1) : (lane === 1 ? 0 : 0);
                if(lane2 !== lane) {
                    const group2 = group.clone();
                    group2.position.set(-lane2*2.2, 0, z);
                    group2.userData = {...group.userData};
                    this.scene.add(group2); this.obstacles.push(group2);
                }
            }
        } else if (Math.random() < 0.4) {

            const m = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color:0xFFD700, emissive:0xaa8800, metalness:1, roughness:0.2}));

    reset: function() {
        this.obstacles.forEach(o=>this.scene.remove(o)); this.obstacles=[]; this.coins.forEach(c=>this.scene.remove(c)); this.coins=[];
        this.gates.forEach(g=>this.scene.remove(g)); this.gates=[]; this.cases.forEach(c=>this.scene.remove(c)); this.cases=[];
        this.decors.forEach(d=>this.scene.remove(d)); this.decors=[];
        this.score=0; this.runChips=0; this.ping=20; this.speed=0.44; this.lane=0;
        this.player.position.set(0,0,0); this.player.rotation.set(0,0,0);
        this.hasShield = Player.hasItem('chair'); this.framesSinceGate = 600; this.framesSinceCase = 0; this.chunksSinceHazard = 5; this.runCasesOpened = 0; 
        document.getElementById('hud-shield').style.display = this.hasShield?'block':'none';
        this.createPlayer();
        this.ground.forEach((g,i)=>g.position.z=i*4-20);
        for(let i=0; i<25; i++) { 
            const z = i*4-20;
            // Road markings
            const markMat = new THREE.MeshBasicMaterial({color:0xffffff});
            const m1 = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 2), markMat);
            m1.rotation.x = -Math.PI/2; m1.position.set(-1.1, -0.49, z); this.scene.add(m1); this.decors.push(m1);
            const m2 = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 2), markMat);
            m2.rotation.x = -Math.PI/2; m2.position.set(1.1, -0.49, z); this.scene.add(m2); this.decors.push(m2);
            const neonLine = new THREE.Mesh(new THREE.PlaneGeometry(0.1, 3), new THREE.MeshBasicMaterial({color:0x00ffff, transparent:true, opacity:0.5}));
            neonLine.rotation.x = -Math.PI/2; neonLine.position.set(0, -0.48, z); this.scene.add(neonLine); this.decors.push(neonLine);
            // Sidewalks
            const swGeo = new THREE.BoxGeometry(4, 0.2, 4); const swMat = new THREE.MeshStandardMaterial({color:0x555555});
            const swL = new THREE.Mesh(swGeo, swMat); swL.position.set(-7, 0.1, z); swL.receiveShadow=true; this.scene.add(swL); this.decors.push(swL);
            const swR = new THREE.Mesh(swGeo, swMat); swR.position.set(7, 0.1, z); swR.receiveShadow=true; this.scene.add(swR); this.decors.push(swR);
            // Decor
            this.spawnDecor(z); this.spawnDecor(z, true); 
        }
        document.getElementById('start-screen').classList.add('hidden'); document.getElementById('game-over-screen').classList.add('hidden'); document.getElementById('hud').classList.remove('hidden');
        AudioSys.play('jump'); this.state='running';
    },
    loop: function() {
        requestAnimationFrame(()=>this.loop());
        if(this.state!=='running') return;
        const dt = this.clock.getDelta(); const timeScale = dt * 60;
        this.speed += 0.00005 * timeScale; this.framesSinceGate += timeScale; this.framesSinceCase += timeScale;
        this.vpnGoal.rotation.y += 0.01 * timeScale;
        if(this.vpnGlow) { this.vpnGlow.rotation.y = this.vpnGoal.rotation.y; this.vpnGlow.scale.setScalar(1 + Math.sin(Date.now() * 0.002) * 0.1); }
        const tx = this.lane*2.2; this.player.position.x += (tx-this.player.position.x)*0.25 * timeScale;
        this.player.rotation.z = (this.player.position.x-tx)*0.1;
        const pd = this.player.userData;
        pd.vel -= 0.015 * timeScale; this.player.position.y += pd.vel * timeScale;
        if(this.player.position.y<=0) { this.player.position.y=0; pd.vel=0; pd.jump=false; if(!pd.slide) { this.player.scale.y=1; const t = Date.now() * 0.015; pd.legs.l.rotation.x = Math.sin(t) * 0.8; pd.legs.r.rotation.x = Math.sin(t + Math.PI) * 0.8; pd.arms.l.rotation.x = Math.sin(t + Math.PI) * 0.8; pd.arms.r.rotation.x = Math.sin(t) * 0.8; } } else { pd.legs.l.rotation.x = -0.5; pd.legs.r.rotation.x = 0.5; pd.arms.l.rotation.x = -2.5; pd.arms.r.rotation.x = -2.5; }
        if(pd.slide) { pd.slideT -= timeScale; pd.legs.l.rotation.x = -1.5; pd.legs.r.rotation.x = -1.5; if(pd.slideT<=0) { pd.slide=false; this.player.scale.y=1; } else { this.player.scale.y=0.4; } }
        const dz = this.speed * timeScale;
        this.ground.forEach(g => { g.position.z -= dz; if(g.position.z < -10) { let maxZ = -999; this.ground.forEach(gg => maxZ = Math.max(maxZ, gg.position.z)); g.position.z = maxZ + 4; this.spawnObjsOnChunk(g.position.z); 
            // Road markings - side lines
            const markMat=new THREE.MeshBasicMaterial({color:0xffffff});
            const m1=new THREE.Mesh(new THREE.PlaneGeometry(0.2,2), markMat); 
            m1.rotation.x=-Math.PI/2; m1.position.set(-1.1,-0.49,g.position.z); this.scene.add(m1); this.decors.push(m1);
            const m2=new THREE.Mesh(new THREE.PlaneGeometry(0.2,2), markMat); 
            m2.rotation.x=-Math.PI/2; m2.position.set(1.1,-0.49,g.position.z); this.scene.add(m2); this.decors.push(m2);
            // Neon center line
            const neonLine = new THREE.Mesh(new THREE.PlaneGeometry(0.1, 3), new THREE.MeshBasicMaterial({color:0x00ffff, transparent:true, opacity:0.5}));
            neonLine.rotation.x = -Math.PI/2; neonLine.position.set(0, -0.48, g.position.z); this.scene.add(neonLine); this.decors.push(neonLine);
            // Sidewalks
            const swGeo = new THREE.BoxGeometry(4, 0.2, 4); const swMat = new THREE.MeshStandardMaterial({color:0x555555});
            const swL = new THREE.Mesh(swGeo, swMat); swL.position.set(-7, 0.1, g.position.z); swL.receiveShadow=true; this.scene.add(swL); this.decors.push(swL);
            const swR = new THREE.Mesh(swGeo, swMat); swR.position.set(7, 0.1, g.position.z); swR.receiveShadow=true; this.scene.add(swR); this.decors.push(swR);
            this.spawnDecor(g.position.z); this.spawnDecor(g.position.z, true); } });
        for(let i=this.decors.length-1; i>=0; i--) { this.decors[i].position.z -= dz; if (this.decors[i].position.z < -20) { this.scene.remove(this.decors[i]); this.decors.splice(i, 1); } }
        [this.obstacles, this.coins, this.gates, this.cases].forEach(arr => {
            for(let i=arr.length-1; i>=0; i--) {
                const o = arr[i]; o.position.z -= dz;
                if (o.userData.type === 'case') { o.rotation.y += 0.05 * timeScale; o.rotation.z += 0.05 * timeScale; }
                // Animate special obstacles
                if (o.userData.propellers) { o.userData.propellers.forEach(p => p.rotation.y += 0.5 * timeScale); }
                if (o.userData.siren) { const flash = Math.sin(Date.now() * 0.01) > 0; o.userData.siren[0].visible = flash; o.userData.siren[1].visible = !flash; }
                if (o.userData.lasers) { o.userData.lasers.forEach(l => l.material.opacity = 0.5 + Math.sin(Date.now() * 0.01) * 0.3); }
                if (o.userData.hover) { o.position.y = Math.sin(Date.now() * 0.003 + o.position.z) * 0.3; }
                if(this.checkColl(this.player, o)) {
                    if(o.userData.type==='gate') {
                        const op=o.userData.op, val=parseFloat(o.userData.val);
                        if(op==='mult') this.runChips *= val; else if(op==='add') this.runChips += val; else if(op==='sub') this.runChips = Math.max(0, this.runChips - val);
                        this.runChips = Math.floor(this.runChips);
                        AudioSys.play('gate');
                        document.getElementById('score-box').classList.add('pop'); setTimeout(()=>document.getElementById('score-box').classList.remove('pop'),200);
                        const zRow = o.position.z;
                        for(let j=this.gates.length-1; j>=0; j--) if(Math.abs(this.gates[j].position.z - zRow)<1) { this.scene.remove(this.gates[j]); this.gates.splice(j,1); }
                        i=arr.length; 
                    } else if(o.userData.type==='hazard') {
                        if(this.hasShield) { this.hasShield=false; document.getElementById('hud-shield').style.display='none'; AudioSys.play('bad'); this.scene.remove(o); arr.splice(i,1); }
                        else this.gameOver("CRASHED");
                    } else if(o.userData.type==='chip') {
                        const kb = Player.data.upgradeLevels['keyboard']||0; const amt = Math.floor(4 * (1 + kb*0.2)); 
                        this.runChips+=amt; Player.data.chips+=amt; AudioSys.playCoin(); Player.updateUI();
                        this.scene.remove(o); arr.splice(i,1);
                        const el = document.createElement('div'); el.className='float-text'; el.innerText=`+${amt}`; el.style.left='50%'; el.style.top='40%'; document.body.appendChild(el); setTimeout(()=>el.remove(),1000);
                    } else if(o.userData.type==='case') { this.openCase(); this.scene.remove(o); arr.splice(i,1); }
                } else if(o.position.z < -10) { this.scene.remove(o); arr.splice(i,1); }
            }
        });
        this.ping += (Player.hasItem('vpn_pro')?0.03:0.06) * timeScale; if(this.ping>999) this.gameOver("PING OVERLOAD");
        document.getElementById('hud-chips').innerText = this.runChips; document.getElementById('ping-text').innerText = Math.floor(this.ping);
        
        // Update particles
        if(this.particles) {
            const positions = this.particles.geometry.attributes.position.array;
            for(let i = 0; i < positions.length; i += 3) {
                positions[i+2] -= dz;
                if(positions[i+2] < -10) positions[i+2] = 100;
                positions[i+1] += Math.sin(Date.now() * 0.001 + i) * 0.01;
            }
            this.particles.geometry.attributes.position.needsUpdate = true;
        }
        
        // Update player spotlight
        if(this.playerLight && this.player) {
            this.playerLight.target = this.player;
            this.playerLight.position.set(this.player.position.x, 8, this.player.position.z - 5);
        }
        
        this.composer.render();
    },
    checkColl: function(p, o) {
        const pb = new THREE.Box3().setFromObject(p); pb.min.x += 0.2; pb.max.x -= 0.2; pb.min.z += 0.2; pb.max.z -= 0.2; pb.max.y -= 0.1; 
        const ob = new THREE.Box3().setFromObject(o);
        if (o.userData.type === 'chip') { ob.expandByScalar(0.3); } else { ob.expandByScalar(-0.1); }
        return pb.intersectsBox(ob);
    },
    setupInput: function() {
        const act = (k) => {
            if (k === 'space') { if (Game.state === 'start') startGame(); else if (Game.state === 'over') resetGame(); else if (Game.state === 'running' && !Game.player.userData.jump) { Game.player.userData.vel = 0.28; Game.player.userData.jump = true; AudioSys.play('jump'); } return; }
            if(this.state!=='running') return;
            if(AudioSys.ctx && AudioSys.ctx.state==='suspended') AudioSys.ctx.resume();
            if(k==='u' && !this.player.userData.jump) { this.player.userData.vel=0.28; this.player.userData.jump=true; AudioSys.play('jump'); }
            if(k==='d') { 
                if(this.player.userData.jump) { this.player.userData.vel = -0.5; } 
                else if(!this.player.userData.slide) { this.player.userData.slide=true; this.player.scale.y=0.5; this.player.userData.slideT=40; }
            }
            if(k==='l' && this.lane < 1) this.lane++; if(k==='r' && this.lane > -1) this.lane--;
        };
        window.addEventListener('keydown', e => { 
            if(e.code==='Space') { e.preventDefault(); act('space'); }
            if(e.code==='ArrowUp' || e.code==='KeyW') { e.preventDefault(); act('u'); }
            if(e.code==='ArrowDown' || e.code==='KeyS') { e.preventDefault(); act('d'); }
            if(e.code==='ArrowLeft' || e.code==='KeyA') act('l'); 
            if(e.code==='ArrowRight' || e.code==='KeyD') act('r'); 
        });
        let sx=0, sy=0;
        window.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive:false});
        window.addEventListener('touchend', e => { const dx=sx-e.changedTouches[0].clientX, dy=sy-e.changedTouches[0].clientY; if(Math.abs(dx)>Math.abs(dy)) (dx>30)?act('l'):(dx<-30)?act('r'):0; else (dy>30)?act('u'):(dy<-30)?act('d'):act('u'); });
    },
    watchAdForCases: function() {
        if (window.ysdk) {
            window.ysdk.adv.showRewardedVideo({
                callbacks: {
                    onOpen: () => { AudioSys.ctx.suspend(); },
                    onRewarded: () => {
                        let lootSummary = [];
                        for(let i=0; i<this.runCasesOpened; i++) { const randItem = BRAINROT_LOOT[Math.floor(Math.random()*BRAINROT_LOOT.length)]; Player.addLoot(randItem.id); lootSummary.push(`<div class="summary-item" style="color:${randItem.color}">${randItem.label}</div>`); }
                        const modal = document.getElementById('summary-modal'); document.getElementById('summary-content').innerHTML = lootSummary.join(''); modal.style.display = 'block';
                        const btn = document.getElementById('ad-bonus-btn'); if(btn) { btn.disabled = true; btn.innerText = "ПОЛУЧЕНО"; }
                    },
                    onClose: () => { AudioSys.ctx.resume(); }, onError: (e) => { console.log('Ad Error:', e); }
                }
            });
        } else {
            alert("AD WATCHED (Mock)");
             let lootSummary = [];
            for(let i=0; i<this.runCasesOpened; i++) { const randItem = BRAINROT_LOOT[Math.floor(Math.random()*BRAINROT_LOOT.length)]; Player.addLoot(randItem.id); lootSummary.push(`<div class="summary-item" style="color:${randItem.color}">${randItem.label}</div>`); }
            const modal = document.getElementById('summary-modal'); document.getElementById('summary-content').innerHTML = lootSummary.join(''); modal.style.display = 'block';
            const btn = document.getElementById('ad-bonus-btn'); if(btn) { btn.disabled = true; btn.innerText = "ПОЛУЧЕНО"; }
        }
    },
    gameOver: function(reason) {
        this.state='over'; Player.data.chips+=this.runChips; Player.save();
        document.getElementById('hud').classList.add('hidden'); document.getElementById('game-over-screen').classList.remove('hidden');
        document.getElementById('run-earned').innerText=this.runChips; document.getElementById('death-reason').innerText=reason;
        const adContainer = document.getElementById('ad-bonus-container');
        if (this.runCasesOpened > 0) { adContainer.innerHTML = `<button id="ad-bonus-btn" class="btn-play btn-ad" onclick="Game.watchAdForCases()">ОТКРЫТЬ ЕЩЁ ${this.runCasesOpened} КЕЙСОВ (AD)</button>`; } else { adContainer.innerHTML = ''; }
    }
};
function startGame() { if(!Game.scene) Game.init(); else Game.reset(); }
function resetGame() { document.getElementById('game-over-screen').classList.add('hidden'); document.getElementById('start-screen').classList.remove('hidden'); Game.state = 'start'; Player.updateUI(); }
function closeDropPopup() { document.getElementById('drop-popup').classList.remove('active'); document.getElementById('case-opening-screen').classList.remove('active'); Game.state='running'; }
function closeSummaryModal() { document.getElementById('summary-modal').style.display='none'; }
function switchTab(t) { document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); event.target.classList.add('active'); }
function closeOfflineModal() { document.getElementById('offline-modal').style.display='none'; }
window.onload = function() { Game.init(); };
</script>
